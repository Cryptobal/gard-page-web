ci:
  collect:
    numberOfRuns: 3
    url:
      - https://www.gard.cl/
      - https://www.gard.cl/servicios
      - https://www.gard.cl/contacto
    settings:
      formFactor: mobile
      screenEmulation:
        mobile: true
        width: 360
        height: 640
        deviceScaleFactor: 2.625
        disabled: false
  assert:
    assertions:
      # ── Nivel ERROR: anti-regresión contra baseline real (medido 2026-07-04) ──
      # Baseline jul-2026: perf 0.44–0.61 · a11y 0.85–0.88 · LCP lab 5.2–6.8s · CLS 0.01
      # Causa raíz LCP identificada: heroes con initial="hidden" (H1 invisible
      # hasta hidratar ~1MB de JS). Fix en PR paralelo (fix/lcp-hero-ssr-visible).
      #
      # RATCHET: cuando el baseline mejore sostenido 2+ semanas, apretar aquí.
      # Próximo apriete esperado tras fix LCP: performance 0.55 · LCP 3500.
      # Meta final (hoy vive como warn/comentario): perf 0.90 · a11y 0.95 · LCP 2500.
      categories:performance: [error, {minScore: 0.40}]
      categories:accessibility: [error, {minScore: 0.80}]
      categories:seo: [error, {minScore: 0.95}]
      categories:best-practices: [error, {minScore: 0.90}]
      largest-contentful-paint: [error, {maxNumericValue: 8000, aggregationMethod: median}]
      cumulative-layout-shift: [error, {maxNumericValue: 0.1, aggregationMethod: p75}]
      # ── Nivel WARN: dirección hacia la meta (visibles en el log, no bloquean) ──
      interactive: [warn, {maxNumericValue: 5000, aggregationMethod: median}]
      total-blocking-time: [warn, {maxNumericValue: 400, aggregationMethod: median}]
